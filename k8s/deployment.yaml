apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtrack-mini
  labels:
    app: cloudtrack-mini
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudtrack-mini
  template:
    metadata:
      labels:
        app: cloudtrack-mini
    spec:
      containers:
        - name: cloudtrack-mini
          image: 888563322742.dkr.ecr.ap-south-1.amazonaws.com/cloudtrack-mini:latest
          imagePullPolicy: IfNotPresent
          imagePullSecrets:
            - name: 
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: APP_NAME
              value: CloudTrack Mini
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
